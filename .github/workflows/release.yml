name: Release npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SemVer already tagged as v<version>
        required: true
      npm_publish:
        description: Type PUBLISH to authorize npm publication
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: inputs.npm_publish == 'PUBLISH'
    environment: npm-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify tagged package version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: node -e "const p=require('./package.json'); if(p.version!==process.env.EXPECTED_VERSION) throw new Error('tag/package version mismatch')"
      - run: npm ci
      - run: npm run verify
      - run: npm pack
      - run: npm run smoke:packed -- ./6reduk-youtrack-mcp-*.tgz
      - run: npm publish ./6reduk-youtrack-mcp-*.tgz --access public
