name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    environment: npm-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve and validate release identity
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          remote_commit="$(git ls-remote origin "refs/tags/${tag}^{}" | cut -f1)"
          if [ -z "$remote_commit" ]; then
            remote_commit="$(git ls-remote origin "refs/tags/${tag}" | cut -f1)"
          fi
          if [ -n "$remote_commit" ] && [ "$remote_commit" != "$GITHUB_SHA" ]; then
            echo "Tag ${tag} already belongs to another commit; bump package version." >&2
            exit 1
          fi
          if npm view "@6reduk/youtrack-mcp@${version}" version --json >/dev/null 2>&1; then
            published=true
            if [ -z "$remote_commit" ]; then
              echo "npm version ${version} exists without a matching tag; refusing ambiguous release." >&2
              exit 1
            fi
          else
            published=false
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$([ -n "$remote_commit" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "published=${published}" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - run: npm run verify
      - run: npm pack
      - run: npm run smoke:packed -- ./6reduk-youtrack-mcp-*.tgz

      - name: Create release tag
        if: steps.release.outputs.tag_exists != 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish package through npm OIDC
        if: steps.release.outputs.published != 'true'
        run: npm publish ./6reduk-youtrack-mcp-*.tgz --access public

      - name: Create checksum
        shell: bash
        run: sha256sum ./6reduk-youtrack-mcp-*.tgz > "6reduk-youtrack-mcp-${{ steps.release.outputs.version }}.tgz.sha256"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          tarball="6reduk-youtrack-mcp-${VERSION}.tgz"
          checksum="${tarball}.sha256"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$tarball" "$checksum" --clobber
          else
            gh release create "$TAG" "$tarball" "$checksum" --verify-tag --title "$TAG" --generate-notes
          fi
